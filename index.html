<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IV Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060910;--bg2:#0c1322;--border:#182035;--text:#c8d8f0;--muted:#3a5070;--accent:#3b9eff;--ok:#22c55e;--w20:#f59e0b;--w10:#f97316;--w5:#ef4444;--mono:'JetBrains Mono',monospace;--head:'Syne',sans-serif}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh;padding:14px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(rgba(59,158,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(59,158,255,.018) 1px,transparent 1px);background-size:36px 36px}
.wrap{max-width:980px;margin:0 auto;position:relative;z-index:1}
.hdr{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:14px 20px;margin-bottom:14px}
.htitle{font-family:var(--head);font-size:1.1em;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.hsub{font-size:.6em;color:var(--muted);margin-top:3px}
.hright{display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.clk{font-size:.78em;color:var(--accent);background:rgba(59,158,255,.08);padding:5px 11px;border-radius:7px;border:1px solid rgba(59,158,255,.15)}
.galert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:11px 16px;margin-bottom:13px;color:#fca5a5;font-weight:700;text-align:center;font-size:.85em;display:none;animation:pulse .85s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.snum{font-family:var(--head);font-size:1.8em;font-weight:800}
.slbl{font-size:.57em;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.snum.a{color:var(--accent)}.snum.ok{color:var(--ok)}.snum.w{color:var(--w20)}.snum.c{color:var(--w5)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px}
.card{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--border);border-radius:13px;padding:18px;position:relative;transition:border-top-color .3s}
.card.ok{border-top-color:var(--ok)}.card.warn20{border-top-color:var(--w20)}.card.warn10{border-top-color:var(--w10)}.card.warn5{border-top-color:var(--w5);animation:pulse .85s infinite}.card.done{border-top-color:var(--w5)}.card.ready{border-top-color:var(--accent)}.card.offline{opacity:.4}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.cp{font-family:var(--head);font-size:.9em}
.cid{font-size:.57em;color:var(--muted);margin-top:2px}
.badge{font-size:.6em;font-weight:700;padding:3px 9px;border-radius:5px;text-transform:uppercase;white-space:nowrap}
.b-ready{background:rgba(59,158,255,.12);color:var(--accent);border:1px solid rgba(59,158,255,.25)}
.b-ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.25)}
.b-warn20{background:rgba(245,158,11,.12);color:var(--w20);border:1px solid rgba(245,158,11,.25)}
.b-warn10{background:rgba(249,115,22,.12);color:var(--w10);border:1px solid rgba(249,115,22,.25)}
.b-warn5,.b-done{background:rgba(239,68,68,.15);color:var(--w5);border:1px solid rgba(239,68,68,.3);animation:blink .65s infinite}
.b-offline{background:rgba(100,100,100,.1);color:var(--muted);border:1px solid rgba(100,100,100,.15)}
.big{text-align:center;padding:4px 0 12px}
.bnum{font-family:var(--head);font-size:3.2em;line-height:1}
.bnum.ok{color:var(--ok)}.bnum.warn20{color:var(--w20)}.bnum.warn10{color:var(--w10)}.bnum.warn5,.bnum.done{color:var(--w5)}.bnum.ready,.bnum.offline{color:var(--muted)}
.bsub{font-size:.6em;color:var(--muted);margin-top:3px;letter-spacing:1px}
.ticks{position:relative;height:12px;margin-bottom:3px}
.tick{position:absolute;font-size:.54em;transform:translateX(-50%);color:var(--muted)}
.t5{left:5%;color:rgba(239,68,68,.5)}.t10{left:10%;color:rgba(249,115,22,.5)}.t20{left:20%;color:rgba(245,158,11,.5)}.t100{left:100%;transform:translateX(-100%)}
.track{height:18px;background:rgba(255,255,255,.04);border-radius:7px;position:relative;overflow:hidden;border:1px solid var(--border)}
.fill{height:100%;border-radius:6px;transition:width 1.2s ease,background .4s}
.fill.ok{background:linear-gradient(90deg,#14532d,#22c55e)}.fill.warn20{background:linear-gradient(90deg,#78350f,#f59e0b)}.fill.warn10{background:linear-gradient(90deg,#7c2d12,#f97316)}.fill.warn5,.fill.done{background:linear-gradient(90deg,#7f1d1d,#ef4444)}.fill.ready,.fill.offline{background:var(--border)}
.flbl{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:.67em;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.thr{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07)}
.thr5{left:5%}.thr10{left:10%}.thr20{left:20%}
.infos{display:flex;justify-content:space-around;border-top:1px solid var(--border);margin-top:11px;padding-top:11px}
.ii{display:flex;flex-direction:column;align-items:center;gap:2px}
.il{font-size:.52em;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.iv{font-size:.84em;font-weight:700}
.srow{display:flex;align-items:center;gap:8px;margin-top:9px;padding:7px 10px;background:rgba(255,255,255,.03);border-radius:7px;border:1px solid var(--border)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot.open{background:var(--ok);box-shadow:0 0 6px var(--ok)}.sdot.closed{background:var(--w5);box-shadow:0 0 6px var(--w5)}
.slbl2{font-size:.67em;color:var(--muted);flex:1}
.sval{font-size:.7em;font-weight:700}
.acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.abtn{flex:1;padding:8px 5px;border-radius:7px;font-family:var(--mono);font-size:.7em;font-weight:700;cursor:pointer;text-align:center;border:1px solid;transition:all .15s;white-space:nowrap;background:none}
.a-red{border-color:rgba(239,68,68,.35);color:var(--w5)}.a-red:hover{background:rgba(239,68,68,.12)}
.a-blue{border-color:rgba(59,158,255,.3);color:var(--accent)}.a-blue:hover{background:rgba(59,158,255,.1)}
.empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted)}
.empty b{display:block;font-family:var(--head);font-size:1.1em;color:var(--accent);margin-bottom:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#0d1525;border:1px solid #1a2a40;border-radius:16px;padding:24px;width:100%;max-width:320px}
.mtitle{font-family:var(--head);font-size:.9em;color:var(--accent);text-align:center;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mpatient{font-size:.72em;color:var(--muted);text-align:center;margin-bottom:16px}
.mbtns{display:flex;gap:8px}
.mbtn{flex:1;padding:11px 8px;border-radius:8px;font-family:var(--mono);font-size:.78em;font-weight:700;cursor:pointer;text-align:center;border:1px solid;transition:all .15s}
.mb-green{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--ok)}.mb-green:hover{background:rgba(34,197,94,.2)}
.mb-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--w5)}.mb-red:hover{background:rgba(239,68,68,.2)}
.mb-cancel{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--muted)}
.foot{text-align:center;padding:14px 0 4px;font-size:.57em;color:#111820}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="htitle">&#127973; IV Monitor</div>
      <div class="hsub">Firebase Real-time &bull; Avtomatik yangilanadi</div>
    </div>
    <div class="hright">
      <div class="dot"></div>
      <div class="clk" id="clk">--:--:--</div>
    </div>
  </div>
  <div class="galert" id="galert">&#128680; XAVF! Bir yoki bir nechta bemorga darhol yordam kerak!</div>
  <div class="stats">
    <div class="stat"><div class="snum a" id="sT">0</div><div class="slbl">Jami</div></div>
    <div class="stat"><div class="snum ok" id="sO">0</div><div class="slbl">Normal</div></div>
    <div class="stat"><div class="snum w" id="sW">0</div><div class="slbl">Ogohlantirish</div></div>
    <div class="stat"><div class="snum c" id="sC">0</div><div class="slbl">Kritik</div></div>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><b>Firebase ga ulanmoqda...</b></div>
  </div>
  <div class="foot">IV Monitor v11 &bull; Firebase Realtime Database</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mtitle">&#9881; Servo Boshqaruv</div>
    <div class="mpatient" id="mPat"></div>
    <div class="mbtns">
      <button class="mbtn mb-green" onclick="servoCmd('open')">&#128275; OCHISH</button>
      <button class="mbtn mb-red" onclick="servoCmd('close')">&#128274; YOPISH</button>
    </div>
    <div class="mbtns" style="margin-top:8px">
      <button class="mbtn mb-cancel" onclick="closeModal()">Bekor qilish</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FIREBASE SOZLASH
//  console.firebase.google.com
//  -> Realtime Database -> sahifaning YUQORISIDAGI URL ni oling
//
//  MUHIM: databaseURL to'g'ri bo'lishi SHART!
//  Firebase Console -> Realtime Database -> bu URL ni ko'ring:
//  https://smartiv-eed6a-default-rtdb.europe-west1.firebasedatabase.app
//                                         ↑↑↑↑↑↑↑↑↑↑↑↑↑
//  "europe-west1" bo'lishi kerak, "firebaseio.com" EMAS!
//
//  ESP32 kodidagi FIREBASE_HOST ham xuddi shu bo'lsin:
//  smartiv-eed6a-default-rtdb.europe-west1.firebasedatabase.app
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

setInterval(()=>{
  document.getElementById('clk').textContent=new Date().toLocaleTimeString();
},1000);

var devs={}, activeId=null;

function stateOf(d){
  if(!d) return 'offline';
  if(d.mode===0||d.mode===1) return 'offline';
  if(d.mode===5) return 'ready';   // idish kutilmoqda
  if(d.mode===3||d.mode===4) return 'done';
  // mode===2: monitoring, foizga qarab
  var p=d.pct||0;
  if(p>20) return 'ok';
  if(p>10) return 'warn20';
  if(p>5)  return 'warn10';
  return 'warn5';
}
const BADGE={ready:'Idish kutilmoqda',ok:'Normal',warn20:'20% qoldi',warn10:'10% qoldi!',warn5:'XAVF!',done:'TUGADI!',offline:'Oflayn'};
const FILL={ok:'ok',warn20:'warn20',warn10:'warn10',warn5:'warn5',done:'done',ready:'ready',offline:'offline'};

function fmtTime(m){
  if(!m||m<=0||m>9999) return '—';
  var h=Math.floor(m/60),mn=Math.floor(m)%60;
  return h>0?(h+'s '+mn+'dq'):(mn+' dq');
}

function render(){
  var list=Object.values(devs);
  var grid=document.getElementById('grid');
  if(list.length===0){
    grid.innerHTML='<div class="empty"><b>Hech qanday qurilma yo\'q</b>ESP32 yoqilsa avtomatik ko\'rinadi</div>';
    ['sT','sO','sW','sC'].forEach(id=>document.getElementById(id).textContent=0);
    document.getElementById('galert').style.display='none';
    return;
  }
  var total=0,okN=0,warnN=0,critN=0,hasCrit=false,html='';
  list.forEach(d=>{
    total++;
    var s=stateOf(d);
    var p=Math.max(0,Math.min(100,d.pct||0));
    var fp=Math.max(0.5,p);
    var bs=s==='warn20'?'warn20':s==='warn10'?'warn10':s;
    if(s==='ok'||s==='ready') okN++;
    else if(s==='warn20'||s==='warn10') warnN++;
    else if(s==='warn5'||s==='done'){critN++;hasCrit=true;}
    var so=d.servo!==false;
    var ps=(s!=='offline')?p.toFixed(1)+'%':'—';
    html+=`<div class="card ${s}">
      <div class="ctop">
        <div>
          <div class="cp">${d.patient||'Bemor'}</div>
          <div class="cid">ID: ${d.id||'—'}</div>
        </div>
        <span class="badge b-${bs}">${BADGE[s]||s}</span>
      </div>
      <div class="big">
        <div class="bnum ${s}">${ps}</div>
        <div class="bsub">QOLGAN MIQDOR</div>
      </div>
      <div class="ticks">
        <span class="tick t5">5%</span>
        <span class="tick t10">10%</span>
        <span class="tick t20">20%</span>
        <span class="tick t100">100%</span>
      </div>
      <div class="track">
        <div class="thr thr5"></div><div class="thr thr10"></div><div class="thr thr20"></div>
        <div class="fill ${FILL[s]||'offline'}" style="width:${fp}%">
          <span class="flbl">${ps}</span>
        </div>
      </div>
      <div class="infos">
        <div class="ii"><span class="il">Qoldi</span><span class="iv">${d.curMl!=null?Math.round(d.curMl)+' ml':'—'}</span></div>
        <div class="ii"><span class="il">t/min</span><span class="iv">${d.dpm&&d.dpm>0?d.dpm.toFixed(1):'—'}</span></div>
        <div class="ii"><span class="il">Vaqt</span><span class="iv">${fmtTime(d.minsLeft)}</span></div>
      </div>
      <div class="srow">
        <div class="sdot ${so?'open':'closed'}"></div>
        <span class="slbl2">Servo (shlang)</span>
        <span class="sval" style="color:${so?'var(--ok)':'var(--w5)'}">${so?'OCHIQ':'YOPIQ'}</span>
      </div>
      <div class="acts">
        <button class="abtn a-blue" onclick="openModal('${d.id}','${(d.patient||'').replace(/'/g,"\\'")}')">&#9881; Servo</button>
        ${d.buzzer?`<button class="abtn a-red" onclick="muteBuzzer('${d.id}')">&#128276; Buzzer off</button>`:''}
      </div>
    </div>`;
  });
  grid.innerHTML=html;
  document.getElementById('sT').textContent=total;
  document.getElementById('sO').textContent=okN;
  document.getElementById('sW').textContent=warnN;
  document.getElementById('sC').textContent=critN;
  document.getElementById('galert').style.display=hasCrit?'block':'none';
}

// Firebase real-time tinglash
db.ref('/devices').on('value',snap=>{
  devs=snap.val()||{};
  render();
},err=>{
  document.getElementById('grid').innerHTML=
    `<div class="empty"><b style="color:var(--w5)">Firebase ulanmadi!</b>
    databaseURL ni tekshiring:<br>
    <code style="font-size:.8em;opacity:.7">${err.message}</code></div>`;
});

// Firebase dan buyruqlarni ESP32 ga yuborish
function openModal(id,patient){
  activeId=id;
  document.getElementById('mPat').textContent='👤 '+patient;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  activeId=null;
}
function servoCmd(action){
  if(!activeId) return;
  db.ref('/devices/'+activeId+'/cmd').set({action:action,ts:Date.now()});
  db.ref('/devices/'+activeId+'/servo').set(action==='open');
  closeModal();
}
function muteBuzzer(id){
  db.ref('/devices/'+id+'/cmd').set({action:'mute',ts:Date.now()});
  db.ref('/devices/'+id+'/buzzer').set(false);
}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay')) closeModal();
});
</script>
</body>
</html>
